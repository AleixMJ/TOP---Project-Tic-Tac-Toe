<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h1 class="title">Tic Tac Toe</h1>
               
        <div>
            <p class="turn-message" data-set="player1">
                Player <span class="current-player">X</span> turn
            </p>
        </div>
    </header>
    

    <div class="grid-container">
        <div class="item" data-x="0" data-y="0"></div>
        <div class="item" data-x="0" data-y="1"></div>
        <div class="item" data-x="0" data-y="2"></div>
        <div class="item" data-x="1" data-y="0"></div>
        <div class="item" data-x="1" data-y="1"></div>
        <div class="item" data-x="1" data-y="2"></div>
        <div class="item" data-x="2" data-y="0"></div>
        <div class="item" data-x="2" data-y="1"></div>
        <div class="item" data-x="2" data-y="2"></div>
    </div>
    <div><button id="new-game"> New Game</button></div>
    <script src="index.js"></script>
</body>
</html>
